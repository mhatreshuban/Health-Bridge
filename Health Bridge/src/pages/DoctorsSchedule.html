<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Monthly Schedule</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f0f6fb;
    }

    .header {
      background: #4c6ef5;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      padding: 20px;
      max-width: 1100px;
      margin: 20px auto;
    }

    .day {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      padding: 10px;
      text-align: left;
      min-height: 120px;
      position: relative;
    }

    .day h4 {
      margin: 0 0 8px 0;
      font-size: 16px;
      font-weight: bold;
    }

    .slot {
      display: block;
      margin: 5px 0;
      padding: 5px;
      background: #4c6ef5;
      color: white;
      border-radius: 5px;
      font-size: 13px;
      text-align: center;
    }

    .day.disabled {
      background: #e9ecef;
      color: #868e96;
      pointer-events: none;
    }

    .weekday {
      text-align: center;
      font-weight: bold;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

  <div class="header">Doctor Availability - Dr. John Doe (September 2025)</div>

  <!-- Weekday Labels -->
  <div class="calendar">
    <div class="weekday">Sun</div>
    <div class="weekday">Mon</div>
    <div class="weekday">Tue</div>
    <div class="weekday">Wed</div>
    <div class="weekday">Thu</div>
    <div class="weekday">Fri</div>
    <div class="weekday">Sat</div>
  </div>

  <!-- Calendar Days -->
  <div class="calendar" id="calendar"></div>

  <script>
    const doctorSchedule = {
      1: ["10:00 AM", "2:00 PM"],
      2: ["11:00 AM"],
      4: ["9:30 AM", "1:30 PM"],
      5: ["3:00 PM"],
      7: ["10:30 AM"],
      10: ["12:00 PM", "4:00 PM"],
      12: ["9:00 AM"],
      15: ["11:30 AM", "2:30 PM"],
      18: ["10:00 AM"],
      20: ["1:00 PM", "3:30 PM"],
      22: ["9:30 AM"],
      25: ["2:00 PM"],
      28: ["11:00 AM", "4:00 PM"],
    };

    const daysInMonth = 30; // Example for September (30 days)
    const startDay = 1; // Assuming month starts on Monday (adjust as needed)

    const calendar = document.getElementById("calendar");

    // Empty slots before the first day
    for (let i = 0; i < startDay; i++) {
      const empty = document.createElement("div");
      empty.classList.add("day", "disabled");
      calendar.appendChild(empty);
    }

    // Fill days
    for (let day = 1; day <= daysInMonth; day++) {
      const dayDiv = document.createElement("div");
      dayDiv.classList.add("day");

      const title = document.createElement("h4");
      title.textContent = day;
      dayDiv.appendChild(title);

      if (doctorSchedule[day]) {
        doctorSchedule[day].forEach(time => {
          const slot = document.createElement("div");
          slot.classList.add("slot");
          slot.textContent = time;
          dayDiv.appendChild(slot);
        });
      } else {
        const msg = document.createElement("p");
        msg.textContent = "Not Available";
        msg.style.fontSize = "12px";
        msg.style.color = "#868e96";
        dayDiv.appendChild(msg);
      }

      calendar.appendChild(dayDiv);
    }
  </script>

</body>
</html>
