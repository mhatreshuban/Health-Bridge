<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Health Bridge Clinic</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
          background: url('background 2.jpeg') no-repeat center center/cover;          
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 320px;
            text-align: center;
        }

        .logo {
            width: 150px;
            margin-bottom: 30px;
        }

        .input-field {
            margin-bottom: 20px;
            position: relative;
        }

        .input-field input {
            width: 100%;
            padding: 12px 40px 12px 40px;
            border: none;
            border-radius: 10px;
            background-color: #f1f1f1;
            font-size: 16px;
        }

        .input-field i {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #888;
            font-size: 18px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background-color: #2c78d0;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #245ea7;
        }

        .options {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 14px;
        }

        .options a {
            color: #555;
            text-decoration: none;
        }

        .options a:hover {
            text-decoration: underline;
        }
    </style>
    <!-- Optional: Add icons using Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <img src="C:\JAVA\WhatsApp Image 2025-09-16 at 7.43.00 PM.jpeg" alt="Health Bridge Clinic" class="logo">

        <form action="dashboard.html" method="post">
            <div class="input-field">
                <i class="fas fa-phone"></i>
                <input type="text" name="mobile" placeholder="Mobile Number" required>
            </div>
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button class="login-btn" type="submit">Sign In</button>

            <div class="options">
                <a href="#">Forget Password?</a>
                <a href="register.html">Create Account</a>
            </div>
        </form>
    </div>
</body>

</html>
