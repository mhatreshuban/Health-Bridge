<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f8ff;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #f0f8ff; /* merged with main background */
      height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      border-right: 1px solid #ddd; /* light separation line */
    }

    .profile {
      text-align: center;
      margin-bottom: 20px;
    }

    .profile img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #ccc;
    }

    .profile p {
      margin: 10px 0;
      font-weight: bold;
    }

    .logout-btn {
      display: block;
      background: #7b5cf5;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .menu {
      list-style: none;
      padding: 0;
    }

    .menu li {
      margin: 15px 0;
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 16px;
    }

    .menu li img {
      width: 24px;
      margin-right: 10px;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 20px;
      background: #f0f8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .btn-container {
      display: flex;
      gap: 20px;
      margin-top: 50px;
    }

    .btn {
      padding: 15px 30px;
      background: #7b5cf5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      min-width: 180px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="profile">
      <img src="" alt="Profile">
      <p>Profile</p>
    </div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
    <ul class="menu">
      <li onclick="goTo('home')"><img src="https://img.icons8.com/ios-filled/50/home.png"/> Home</li>
      <li onclick="goTo('doctor')"><img src="https://img.icons8.com/ios-filled/50/doctor-male.png"/> Doctor</li>
      <li onclick="goTo('schedule')"><img src="https://img.icons8.com/ios-filled/50/calendar.png"/> Schedule</li>
      <li onclick="goTo('appointment')"><img src="https://img.icons8.com/ios-filled/50/appointment-reminders.png"/> Appointment</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="btn-container">
      <button class="btn" onclick="bookAppointment()">Book Appointment</button>
      <button class="btn" onclick="checkAppointments()">Appointment Available</button>
    </div>
  </div>

  <script>
    // Navigation functions
    function goTo(page) {
      alert("Navigating to: " + page);
    }

    // Logout
    function logout() {
      alert("You have been logged out!");
    }

    // Button actions
    function bookAppointment() {
      alert("Booking an appointment...");
    }

    function checkAppointments() {
      alert("Checking available appointments...");
    }
  </script>

</body>
</html>
