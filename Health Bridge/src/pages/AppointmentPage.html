<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Form</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background:url("C:\JAVA\appointment page img.jpeg") no-repeat right center;
      background-size: contain;
    }

    .appointment-box {
      background-color: #b3e5fc;
      padding: 30px 25px;
      border-radius: 15px;
      width: 350px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .appointment-box h2 {
      margin-bottom: 20px;
      font-size: 20px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .input-group label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
    }

    .options-title {
      font-weight: bold;
      margin: 15px 0 10px;
    }

    .options-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    /* Hide radio buttons */
    input[type="radio"] {
      display: none;
    }

    /* Label as button */
    .option-label {
      background-color: #00bcd4;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      user-select: none;
    }

    /* Highlight selected option */
    input[type="radio"]:checked + .option-label {
      background-color: #004d40;
    }

    .book-btn {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .book-btn:hover {
      background-color: #0d47a1;
    }
  </style>
</head>
<body>

  <div class="appointment-box">
    <h2>Schedule Your Appointment</h2>

    <form action="confirm.html" method="post">
      <div class="input-group">
        <label>Patients Full Name</label>
        <input type="text" name="name" required />
      </div>

      <div class="input-group">
        <label>Patients Age</label>
        <input type="number" name="age" required />
      </div>

      <div class="input-group">
        <label>Description About Illness Facing</label>
        <textarea name="illness" rows="3" required></textarea>
      </div>

      <div class="options-title">Date's Available</div>
      <div class="options-grid">
        <input type="radio" id="date1" name="selected_date" value="12 Aug">
        <label for="date1" class="option-label">12' Aug</label>

        <input type="radio" id="date2" name="selected_date" value="13 Aug">
        <label for="date2" class="option-label">13' Aug</label>

        <input type="radio" id="date3" name="selected_date" value="14 Aug">
        <label for="date3" class="option-label">14' Aug</label>

        <input type="radio" id="date4" name="selected_date" value="19 Aug">
        <label for="date4" class="option-label">19' Aug</label>
      </div>

      <div class="options-title">Timing's Available</div>
      <div class="options-grid">
        <input type="radio" id="time1" name="selected_time" value="11:00 am">
        <label for="time1" class="option-label">11:00 am</label>

        <input type="radio" id="time2" name="selected_time" value="11:30 am">
        <label for="time2" class="option-label">11:30 am</label>

        <input type="radio" id="time3" name="selected_time" value="12 pm">
        <label for="time3" class="option-label">12 pm</label>

        <input type="radio" id="time4" name="selected_time" value="1 pm">
        <label for="time4" class="option-label">1 pm</label>
      </div>

      <button type="submit" class="book-btn">Book Slot</button>
    </form>
  </div>

</body>
</html>
